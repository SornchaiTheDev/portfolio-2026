<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <rect width="1200" height="480" fill="#0c0c0c"/>

  <defs>
    <filter id="caustic" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.028" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="fade" cx="50%" cy="50%" r="50%" gradientUnits="userSpaceOnUse" fx="600" fy="240">
      <stop offset="0%"   stop-color="white" stop-opacity="1"/>
      <stop offset="60%"  stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="vignette">
      <rect width="1200" height="480" fill="url(#fade)"/>
    </mask>
  </defs>

  <!-- Ambient centre glow -->
  <ellipse cx="600" cy="240" rx="420" ry="220" fill="url(#glow)"/>

  <!-- Distorted grid — the caustic layer -->
  <g filter="url(#caustic)" mask="url(#vignette)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8" fill="none">
    <!-- horizontal lines -->
    <line x1="0" y1="48"  x2="1200" y2="48"/>
    <line x1="0" y1="96"  x2="1200" y2="96"/>
    <line x1="0" y1="144" x2="1200" y2="144"/>
    <line x1="0" y1="192" x2="1200" y2="192"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="288" x2="1200" y2="288"/>
    <line x1="0" y1="336" x2="1200" y2="336"/>
    <line x1="0" y1="384" x2="1200" y2="384"/>
    <line x1="0" y1="432" x2="1200" y2="432"/>
    <!-- vertical lines -->
    <line x1="109"  y1="0" x2="109"  y2="480"/>
    <line x1="218"  y1="0" x2="218"  y2="480"/>
    <line x1="327"  y1="0" x2="327"  y2="480"/>
    <line x1="436"  y1="0" x2="436"  y2="480"/>
    <line x1="545"  y1="0" x2="545"  y2="480"/>
    <line x1="654"  y1="0" x2="654"  y2="480"/>
    <line x1="763"  y1="0" x2="763"  y2="480"/>
    <line x1="872"  y1="0" x2="872"  y2="480"/>
    <line x1="981"  y1="0" x2="981"  y2="480"/>
    <line x1="1090" y1="0" x2="1090" y2="480"/>
  </g>
</svg>
