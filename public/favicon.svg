<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="caustic">
      <feTurbulence type="fractalNoise" baseFrequency="0.55 0.75" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="bounds">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- base -->
  <rect width="32" height="32" rx="7" fill="#111111"/>

  <!-- caustic grid -->
  <g clip-path="url(#bounds)" filter="url(#caustic)" stroke="rgba(255,255,255,0.14)" stroke-width="0.6" fill="none">
    <line x1="0" y1="8"  x2="32" y2="8"/>
    <line x1="0" y1="16" x2="32" y2="16"/>
    <line x1="0" y1="24" x2="32" y2="24"/>
    <line x1="8"  y1="0" x2="8"  y2="32"/>
    <line x1="16" y1="0" x2="16" y2="32"/>
    <line x1="24" y1="0" x2="24" y2="32"/>
  </g>

  <!-- centre glow -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- monogram -->
  <text
    x="16" y="22"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="17"
    font-weight="600"
    fill="rgba(255,255,255,0.88)"
    letter-spacing="-0.5"
  >S</text>
</svg>
